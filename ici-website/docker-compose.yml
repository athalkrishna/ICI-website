# Local development database — start with: docker compose up -d
services:
  mysql:
    image: mysql:8.0
    container_name: ici-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ici_website
    volumes:
      - ici_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot']
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  ici_mysql_data:
